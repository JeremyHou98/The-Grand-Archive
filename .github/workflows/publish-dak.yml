name: Publish dak to npm

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: "none"
        type: choice
        options:
          - patch
          - minor
          - major
          - none
  # 被其他 workflow 调用
  workflow_call:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Set version
        run: |
          BUMP="${{ inputs.bump }}"
          DATE=$(date -u +%Y%m%d)
          HASH=$(git rev-parse --short HEAD)

          # Bump base version if requested
          if [[ -n "$BUMP" && "$BUMP" != "none" ]]; then
            cd packages/sdk && npm version "$BUMP" --no-git-tag-version && cd ../..
            cd packages/cli && npm version "$BUMP" --no-git-tag-version && cd ../..
          fi

          # Read base version from SDK
          BASE=$(node -p "require('./packages/sdk/package.json').version")
          VERSION="${BASE}-${DATE}.${HASH}"

          # Set prerelease version on both packages
          cd packages/sdk && npm version "$VERSION" --no-git-tag-version --allow-same-version && cd ../..
          cd packages/cli && npm version "$VERSION" --no-git-tag-version --allow-same-version && cd ../..

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "📌 Version: $VERSION"

      - name: Build SDK
        run: cd packages/sdk && bun run build

      - name: Build CLI
        run: cd packages/cli && bun run build

      - name: Verify build output
        run: |
          echo "📦 SDK build output:"
          ls -lh packages/sdk/dist/
          echo ""
          echo "📦 CLI build output:"
          ls -lh packages/cli/dist/

      - name: Publish SDK
        run: cd packages/sdk && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI
        run: cd packages/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version update
        run: |
          BUMP="${{ inputs.bump }}"
          if [[ -n "$BUMP" && "$BUMP" != "none" ]]; then
            # Restore base version (without prerelease suffix) for next build
            BASE=$(echo "$VERSION" | sed 's/-.*//')
            cd packages/sdk && npm version "$BASE" --no-git-tag-version --allow-same-version && cd ../..
            cd packages/cli && npm version "$BASE" --no-git-tag-version --allow-same-version && cd ../..
          else
            git checkout packages/sdk/package.json packages/cli/package.json
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/sdk/package.json packages/cli/package.json
          if ! git diff --cached --quiet; then
            git commit -m "📦 dak v${VERSION}"
            git push
          fi

      - name: Summary
        run: |
          echo "## 📦 Published @littlelittlecloud/dak v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Feeds:** $(node -e "const{getFeeds}=await import('./dist/index.js');console.log(getFeeds().length)")" >> "$GITHUB_STEP_SUMMARY"
          echo "- **npm:** https://www.npmjs.com/package/@littlelittlecloud/dak" >> "$GITHUB_STEP_SUMMARY"
