name: Publish dak to npm

on:
  # GitHub Release 创建时自动发布
  release:
    types: [published]
  # 手动触发
  workflow_dispatch:
  # 被其他 workflow 调用
  workflow_call:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Read version
        run: |
          VERSION=$(node -p "require('./packages/sdk/package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "📌 Version: $VERSION"

      - name: Build SDK
        run: cd packages/sdk && bun run build

      - name: Build CLI
        run: cd packages/cli && bun run build

      - name: Verify build output
        run: |
          echo "📦 SDK build output:"
          ls -lh packages/sdk/dist/
          echo ""
          echo "📦 CLI build output:"
          ls -lh packages/cli/dist/

      - name: Publish SDK
        run: cd packages/sdk && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI
        run: cd packages/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## 📦 Published @littlelittlecloud/dak v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **npm SDK:** https://www.npmjs.com/package/@littlelittlecloud/dak" >> "$GITHUB_STEP_SUMMARY"
          echo "- **npm CLI:** https://www.npmjs.com/package/@littlelittlecloud/dak-cli" >> "$GITHUB_STEP_SUMMARY"
