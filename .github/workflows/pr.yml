name: PR Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build SDK
        run: cd packages/sdk && bun run build

      - name: Build CLI
        run: cd packages/cli && bun run build

      - name: Build UI
        run: cd packages/ui && bun run build

      - name: Typecheck packages
        run: |
          cd packages/contract && bunx tsc --noEmit
          cd ../sdk && bunx tsc --noEmit
          cd ../cli && bunx tsc --noEmit
          cd ../server && bunx tsc --noEmit
          cd ../ingestion-worker && bunx tsc --noEmit

      - name: Test
        run: |
          cd packages/server && bun test || true
          cd ../ingestion-worker && bun test || true

  preview-deploy:
    needs: check
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}
      url: https://dak-server-pr-${{ github.event.pull_request.number }}.fly.dev
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_NAME: dak-server-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create preview app (if not exists)
        run: flyctl apps create "$APP_NAME" --org personal 2>/dev/null || true

      - name: Set secrets
        run: |
          flyctl secrets set -a "$APP_NAME" --stage \
            R2_ENDPOINT="${{ secrets.R2_ENDPOINT }}" \
            R2_ACCESS_KEY_ID="${{ secrets.R2_ACCESS_KEY_ID }}" \
            R2_SECRET_ACCESS_KEY="${{ secrets.R2_SECRET_ACCESS_KEY }}" \
            BETTER_AUTH_URL="https://$APP_NAME.fly.dev" \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"

      - name: Deploy preview
        run: flyctl deploy --config packages/server/fly.preview.toml --app "$APP_NAME" --remote-only

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${process.env.APP_NAME}.fly.dev`;
            const body = `🔗 **Preview deployed:** ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body?.includes('Preview deployed'));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

  preview-cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Setup Fly
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Destroy preview app
        run: flyctl apps destroy "dak-server-pr-${{ github.event.pull_request.number }}" --yes 2>/dev/null || true
