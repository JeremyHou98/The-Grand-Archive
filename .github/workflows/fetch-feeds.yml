name: Fetch Feeds

on:
  schedule:
    # 每 30 分钟抓取一次
    - cron: "*/30 * * * *"
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

# 同时只允许一个部署，跳过排队中的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Fetch feeds
        run: bun run fetch
        env:
          # 如果有需要 API Key 的源，在 GitHub Secrets 中添加后在此引用
          # SOME_API_KEY: ${{ secrets.SOME_API_KEY }}
          RSSHUB_BASE_URL: ${{ secrets.RSSHUB_BASE_URL }}
          NODE_ENV: production

      - name: Commit & push changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/ config/fetch-status.json
          # 仅在有变更时 commit
          if git diff --cached --quiet; then
            echo "📭 No new feeds, nothing to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            NEW_COUNT=$(git diff --cached --numstat | wc -l | tr -d ' ')
            git commit -m "📡 auto-fetch: ${NEW_COUNT} files updated (${TIMESTAMP})"
            git push
            echo "✅ Pushed ${NEW_COUNT} updated files."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  # 仅在有新 feeds 时构建并部署到 GitHub Pages
  build:
    needs: fetch
    if: needs.fetch.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main # 拉取包含刚推送的 feeds 的最新提交

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install

      - name: Install web dependencies
        run: cd web && bun install

      - name: Generate data & build
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 有新 feeds 时自动发布 dak 包
  publish-dak:
    needs: fetch
    if: needs.fetch.outputs.has_changes == 'true'
    uses: ./.github/workflows/publish-dak.yml
    secrets: inherit
