name: Fetch Feeds

on:
  schedule:
    # 每 30 分钟抓取一次
    - cron: "*/30 * * * *"
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Fetch feeds
        run: bun run fetch
        env:
          # 如果有需要 API Key 的源，在 GitHub Secrets 中添加后在此引用
          # SOME_API_KEY: ${{ secrets.SOME_API_KEY }}
          NODE_ENV: production

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/
          # 仅在有变更时 commit
          if git diff --cached --quiet; then
            echo "📭 No new feeds, nothing to commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            NEW_COUNT=$(git diff --cached --numstat | wc -l | tr -d ' ')
            git commit -m "📡 auto-fetch: ${NEW_COUNT} files updated (${TIMESTAMP})"
            git push
            echo "✅ Pushed ${NEW_COUNT} updated files."
          fi
