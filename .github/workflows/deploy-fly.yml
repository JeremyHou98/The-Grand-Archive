name: Deploy Server & Worker

on:
  push:
    branches: [main]
    paths:
      - "packages/contract/**"
      - "packages/server/**"
      - "packages/ui/**"
      - "packages/sdk/**"
      - "packages/ingestion-worker/**"
      - "config/sources.yaml"
      - "Dockerfile"
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - server
          - worker

concurrency:
  group: deploy-fly
  cancel-in-progress: false

jobs:
  deploy-server:
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'server') ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Pre-deploy single-writer guard
        run: bun run scripts/check-fly-single-machine.ts --app dak-server --volume dak_data
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ✅ NEW: stop machine BEFORE deploy
      - name: Stop existing machine (avoid volume lock / restart race)
        run: |
          echo "Stopping Fly machines for dak-server..."
          flyctl machines list -a dak-server --json \
            | jq -r '.[].id' \
            | xargs -I {} flyctl machine stop {} -a dak-server || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # optional: wait to ensure state propagation
      - name: Wait for machines to fully stop
        run: sleep 10

      - name: Sync secrets
        run: |
          flyctl secrets set -a dak-server --stage \
            R2_ENDPOINT="${{ secrets.R2_ENDPOINT }}" \
            R2_ACCESS_KEY_ID="${{ secrets.R2_ACCESS_KEY_ID }}" \
            R2_SECRET_ACCESS_KEY="${{ secrets.R2_SECRET_ACCESS_KEY }}" \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            BETTER_AUTH_URL="https://dak-news.com" \
            GITHUB_CLIENT_ID="${{ secrets.OAUTH_GITHUB_CLIENT_ID }}" \
            GITHUB_CLIENT_SECRET="${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}" \
            GOOGLE_CLIENT_ID="${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}" \
            GOOGLE_CLIENT_SECRET="${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}" \
            INGEST_ALLOWED_USERS="${{ secrets.INGEST_ALLOWED_USERS }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy server
        run: flyctl deploy --config packages/server/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-worker:
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'worker') ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy worker
        run: flyctl deploy --config packages/ingestion-worker/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
