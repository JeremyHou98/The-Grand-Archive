# RSS 订阅源配置
# 聚焦：财经 · 地缘政治 · 国际形势 · 股市 · 经济 · 社交热点

sources:
  # ── 国际新闻 / 地缘政治 ──────────────────────────
  - name: BBC 中文
    url: https://feeds.bbci.co.uk/zhongwen/simp/rss.xml
    category: news
    enabled: true
    fetch_interval: 1800
    tags: [国际, 地缘政治]
    description: BBC 中文新闻

  - name: 纽约时报中文
    url: https://cn.nytimes.com/rss/
    category: news
    enabled: true
    fetch_interval: 1800
    tags: [国际, 深度]
    description: 纽约时报中文版

  - name: Reuters World
    url: https://feeds.reuters.com/Reuters/worldNews
    category: news
    enabled: false  # Feedburner 域名已停服
    fetch_interval: 1800
    tags: [国际, 地缘政治]
    description: 路透社国际新闻

  - name: Al Jazeera
    url: https://www.aljazeera.com/xml/rss/all.xml
    category: news
    enabled: true
    fetch_interval: 1800
    tags: [国际, 中东, 地缘政治]
    description: 半岛电视台全球新闻

  - name: AP News
    url: http://localhost:1200/apnews/topics/apf-topnews
