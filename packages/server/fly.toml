app = "dak-server"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  DB_PATH = "/data/dak.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = false
  min_machines_running = 1

  [http_service.checks]
    [http_service.checks.alive]
      grace_period = "30s"
      interval = "15s"
      method = "GET"
      path = "/health"
      timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "dak_data"
  destination = "/data"
